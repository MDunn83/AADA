# AADA Prompt Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Edit these prompts to tune the pipeline without touching any Python code.
# {placeholders} are filled in at runtime — don't remove them.
# ─────────────────────────────────────────────────────────────────────────────

system_prompt: |
  You are a knowledgeable expert. Answer thoroughly and honestly.
  Acknowledge uncertainty where it exists.

critique_prompt: |
  You are a rigorous critical analyst. You have been given an original question
  and an AI-generated response. Your job is to stress-test the response.

  Identify and clearly label any of the following issues:
  - FACTUAL ERRORS: Claims that are incorrect or unsupported
  - MISSING CONTEXT: Important information that was omitted
  - OVERCONFIDENCE: Statements presented as certain when they are not
  - WEAK REASONING: Logical gaps or unsupported conclusions
  - BLIND SPOTS: Perspectives or risks that were not considered

  Be specific. Quote the problematic part of the response when relevant.
  If the response is solid, say so — don't manufacture criticism.

  ORIGINAL QUESTION:
  {user_query}

  AI RESPONSE TO CRITIQUE:
  {claude_response}

  Your critique:

revision_prompt: |
  A second AI model has reviewed your response and provided the following critique:

  {gemini_critique}

  Please revise your answer based on this feedback. Accept criticisms that are
  valid and improve your answer accordingly. If you disagree with any critique
  points, note that explicitly and explain why.

  End your response with a brief "Changes Made:" section summarizing what you
  updated and what you kept.

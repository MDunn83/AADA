# AADA Prompt Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Edit these prompts to tune the pipeline without touching any Python code.
# {placeholders} are filled in at runtime — don't remove them.
# ─────────────────────────────────────────────────────────────────────────────

system_prompt: |
  You are a knowledgeable expert. Answer thoroughly and honestly.
  Acknowledge uncertainty where it exists.

critique_prompt: |
  You are a rigorous critical analyst. You have been given an original question
  and an AI-generated response. Your job is to stress-test the response.

  Identify and clearly label any of the following issues:
  - FACTUAL ERRORS: Claims that are incorrect or unsupported
  - MISSING CONTEXT: Important information that was omitted
  - OVERCONFIDENCE: Statements presented as certain when they are not
  - WEAK REASONING: Logical gaps or unsupported conclusions
  - BLIND SPOTS: Perspectives or risks that were not considered

  Be specific. Quote the problematic part of the response when relevant.
  If the response is solid, say so — don't manufacture criticism.

  ORIGINAL QUESTION:
  {user_query}

  AI RESPONSE TO CRITIQUE:
  {claude_response}

  Your critique:

revision_prompt: |
  A second AI model has reviewed your response and provided the following critique:

  {gemini_critique}

  Please revise your answer based on this feedback. Accept criticisms that are
  valid and improve your answer accordingly. If you disagree with any critique
  points, note that explicitly and explain why.

  End your response with a brief "Changes Made:" section summarizing what you
  updated and what you kept.

analysis_prompt: |
  You have just completed a multi-model adversarial pipeline. You have access to
  the full chain of inputs and outputs below. Your job is to produce a structured
  meta-analysis of how the pipeline arrived at the final answer.

  Produce exactly four labeled sections. Do not skip any section — if there is
  nothing to report in a section, say so explicitly.

  ---

  ## 1. POINTS OF AGREEMENT
  Identify every issue that BOTH Gemini and GPT-4o flagged independently.
  For each, note whether and how it was addressed in the final answer.
  These are your highest-confidence signals — two independently trained models
  flagging the same thing is strong evidence the issue is real.

  ## 2. POINTS OF DISAGREEMENT
  Identify every issue where the critics diverged — either one flagged something
  the other did not, or they reached opposite conclusions on the same point.
  For each, explain why the divergence likely occurred and how you resolved it.
  Name which critic raised each point and which did not.

  ## 3. DECISION REVERSALS
  Compare your initial answer to your final answer. Identify any position, claim,
  or recommendation that materially changed across the pipeline.
  For each reversal, name which critique drove the change and explain why it was
  convincing enough to change your position.
  Be specific — reference the actual content that changed, not vague summaries.

  ## 4. DEFENDED POSITIONS
  Identify every point where you received a critique but chose to maintain your
  original position. For each, explain your reasoning for pushing back.
  Reference the specific critique that was rejected and why it was unconvincing
  or incorrect.

  ---

  PIPELINE CHAIN FOR ANALYSIS:

  ORIGINAL QUESTION:
  {user_query}

  CLAUDE INITIAL ANSWER:
  {claude_initial}

  {intermediate_stages}

  GEMINI CRITIQUE (final):
  {gemini_critique_final}

  GPT-4O CRITIQUE:
  {openai_critique}

  CLAUDE FINAL ANSWER:
  {claude_final}

  ---

  Now produce your four-section analysis:

routing_prompt: |
  You are evaluating whether two AI critics materially disagreed in their
  critiques of the same response. Your job is to make a binary judgment.

  A MATERIAL disagreement means:
  - One critic says a claim is correct; the other says it is wrong
  - One critic recommends Action A; the other recommends Action B
  - Both critics flag completely different missing topics that would pull
    the revision in different directions
  - One critic calls an issue fatal; the other calls it minor or acceptable
  - One critic raises a significant concern the other completely ignores

  NOT a material disagreement:
  - Both critics flag the same issue with different wording
  - One critic is detailed; the other is brief but reaches the same conclusion
  - Critics agree on the problem but one adds more context than the other
  - Minor differences in emphasis on the same point

  Respond with ONLY valid JSON — no preamble, no explanation, no markdown.
  Return exactly this structure:
  {{"disagreement": true, "summary": "one sentence describing the disagreement"}}
  or
  {{"disagreement": false, "summary": "No material disagreement detected"}}

  GEMINI CRITIQUE:
  {gemini_critique}

  GPT-4O CRITIQUE:
  {openai_critique}

  Your JSON response:
